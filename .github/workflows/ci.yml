name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --config .swiftlint.yml --strict --quiet

  # Stower requires the Xcode 27 SDK, which is not available on a
  # GitHub-hosted runner yet. Builds and tests run locally or in Xcode Cloud
  # until GitHub publishes an image that includes Xcode 27.
