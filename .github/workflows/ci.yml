name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --config .swiftlint.yml --strict --quiet

  build:
    name: Build
    # Developer-beta SDKs are not installed on GitHub-hosted runners. Move
    # this back to macos-latest once Xcode 27 becomes a hosted image.
    runs-on: [self-hosted, macOS, xcode-27]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build iOS
        run: |
          xcodebuild build \
            -workspace Stower.xcworkspace \
            -scheme Stower \
            -destination "generic/platform=iOS" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build macOS
        run: |
          xcodebuild build \
            -workspace Stower.xcworkspace \
            -scheme Stower \
            -destination "generic/platform=macOS" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

  test:
    name: Test
    runs-on: [self-hosted, macOS, xcode-27]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace Stower.xcworkspace \
            -scheme Stower \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro,OS=27.0" \
            -skip-testing:StowerUITests \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
          | xcbeautify --renderer github-actions --disable-logging

      - name: Summarize test failures
        if: failure()
        run: |
          # Print every test failure with file/line context so the job log
          # actually tells us which tests broke, even when xcbeautify
          # suppresses passes for readability.
          xcrun xcresulttool get test-results tests \
            --path TestResults.xcresult \
            --format json \
            | jq -r '
              .. | objects
              | select(.testStatus == "Failure" or .result == "Failure")
              | "\(.name // .identifier // "unknown")"
            ' \
            | sort -u || true

          xcrun xcresulttool get log \
            --path TestResults.xcresult \
            --type action 2>/dev/null | tail -200 || true

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
